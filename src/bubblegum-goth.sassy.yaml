# Theme Config - bubblegum-goth

config:
  $schema: vscode://schemas/color-theme
  name: bubblegum-goth
  type: dark
  output: ../dist

  import:
    - ./dark/palette.yaml
    - ./dark/variables.yaml
    - ./dark/theme-colors.yaml
    - ./dark/theme-tokenColors.yaml
    - ./dark/theme-semanticTokenColors.yaml

  custom:
    semanticHighlighting: true
    colorSpaceName: sRGB

vars:
  variant:
    fg: $$white
    bg: $$black
    accent: $$pink
    accentSecondary: desaturate($variant.accent, 35)
    shadow: alpha($variant.accent, 0.25)
