# Theme Config - blackboard

config:
  $schema: vscode://schemas/color-theme
  name: blackboard
  type: dark
  output: ../dist

  import:
    - ./dark/palette.yaml
    - ./dark/variables.yaml
    - ./dark/theme-colors.yaml
    - ./dark/theme-tokenColors.yaml
    - ./dark/theme-semanticTokenColors.yaml

  custom:
    semanticHighlighting: true
    colorSpaceName: sRGB

vars:
  variant:
    fg: $$white
    bg: $$black
    accent: $$blue
    accentSecondary: darken($variant.accent, 50)
    shadow: alpha($variant.accent, 0.25)
